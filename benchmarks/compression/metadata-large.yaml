# Deployment configuration
# Environment: development
# Last updated: 2026-07-02

version: "3.8"

services:
  scheduler-0:
    image: registry.example.com/scheduler:v4.14.48
    replicas: 2
    resources:
      cpu: "1000m"
      memory: "512Mi"
    env:
      DATABASE_URL: "postgresql://db:5432/scheduler"
      REDIS_URL: "redis://cache:6379/0"
      LOG_LEVEL: "debug"
      ENABLE_METRICS: "false"
    ports:
      - 8000:8000
    healthcheck:
      path: /health
      interval: 10s
      timeout: 5s
    depends_on:
      - database
      - redis  cdn-proxy-1:
    image: registry.example.com/cdn-proxy:v2.7.92
