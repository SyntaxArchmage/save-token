  database:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    env:
      POSTGRES_PASSWORD: "${DB_PASSWORD}"

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

volumes:
  pgdata:
    driver: local
