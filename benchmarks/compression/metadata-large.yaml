      REDIS_URL: "redis://cache:6379/1"
      LOG_LEVEL: "info"
      ENABLE_METRICS: "true"
    ports:
      - 8001:8001
    healthcheck:
      path: /health
      interval: 30s
      timeout: 5s
    depends_on:
      - database
      - redis  scheduler-2:
